name: Connect
main: org.example.connect.ConnectPlugin
version: 1.0.0
api-version: "1.21"
depend: [PlaceholderAPI]
commands:
  connect:
    description: Connect plugin commands.
    usage: /connect reload|fine
permissions:
  connect.bypass:
    description: Disable Discord verification reminders for the player.
    default: false
  connect.reload:
    description: Reload Connect plugin config.
    default: op

  connect.fine:
    description: Run verification fine wave for whitelist players.
    default: op
